name: Deploy web to FTP

on:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @crm/web build

      - name: Add noindex meta
        run: |
          sed -i 's|<title>|<meta name="robots" content="noindex,nofollow" /><title>|' apps/web/dist/index.html

      - name: Add robots.txt
        run: echo -e "User-agent: *\nDisallow: /" > apps/web/dist/robots.txt

      # .htaccess: Auth FIRST, then SPA rewrite.
      # Порядок критичен: Basic Auth должен идти до RewriteRule,
      # иначе Apache спрашивает пароль на каждый subrequest rewrite.
      # .htpasswd НЕ создаём в CI — он живёт на сервере и управляется вручную.
      # Это предотвращает случайный сброс пароля при каждом деплое.
      - name: Add .htaccess
        run: |
          cat > apps/web/dist/.htaccess << 'HTEOF'
AuthType Basic
AuthName "crm"
AuthUserFile /var/www/u3380578/data/www/opentgp.ru/crm_life/.htpasswd
Require valid-user

RewriteEngine On
RewriteBase /crm_life/
RewriteRule ^index\.html$ - [L]
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule . /crm_life/index.html [L]
HTEOF

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: opentgp.ru
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: apps/web/dist/
          server-dir: www/opentgp.ru/crm_life/
          protocol: ftps
          # .htpasswd исключён: он живёт на сервере, CI его не трогает.
          # Для смены пароля — только htpasswd вручную на сервере.
          exclude: |
            **/.htpasswd
