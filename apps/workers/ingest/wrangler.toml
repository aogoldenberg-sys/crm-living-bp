name = "crm-ingest"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# nodejs_compat_v2 нужен для firebase-admin:
# поддерживает node:crypto, node:http, node:net и прочие Node.js API.
compatibility_flags = ["nodejs_compat_v2"]

# Секреты задаются через `wrangler secret put`:
#   wrangler secret put FIREBASE_SERVICE_ACCOUNT_JSON
#   wrangler secret put INGEST_API_SECRET
#
# Не хранить в .toml или репозитории — только в Cloudflare dashboard.

[ai]
binding = "AI"
