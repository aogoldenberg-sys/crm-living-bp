<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <!-- Фон: тёмный слева → чуть светлее справа -->
    <radialGradient id="rg1" cx="75%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3A322A"/>
      <stop offset="60%" stop-color="#2A2520"/>
      <stop offset="100%" stop-color="#1A1816"/>
    </radialGradient>
    <!-- Второй радиальный акцент: золотое свечение справа -->
    <radialGradient id="glow2" cx="80%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#B8964E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#B8964E" stop-opacity="0"/>
    </radialGradient>
    <!-- Шестиугольная сетка -->
    <pattern id="hex" x="0" y="0" width="80" height="92" patternUnits="userSpaceOnUse">
      <polygon points="40,4 74,22 74,58 40,76 6,58 6,22"
        fill="none" stroke="#B8964E" stroke-width="0.5" opacity="0.12"/>
    </pattern>
    <!-- Градиент линий графика: золото → fade -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8964E" stop-opacity="0.0"/>
      <stop offset="40%" stop-color="#B8964E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#B8964E" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="1440" height="900" fill="url(#rg1)"/>
  <!-- Гексагональная сетка на весь холст -->
  <rect width="1440" height="900" fill="url(#hex)"/>
  <!-- Золотое свечение в правой части -->
  <rect width="1440" height="900" fill="url(#glow2)"/>

  <!-- Горизонтальные линии — «кривая выручки» -->
  <g stroke="url(#lineGrad)" stroke-width="1.2" fill="none">
    <path d="M 600 480 Q 800 380 1000 310 T 1400 260"/>
    <path d="M 600 530 Q 820 430 1020 370 T 1400 330" opacity="0.6"/>
    <path d="M 600 580 Q 840 490 1050 440 T 1400 410" opacity="0.35"/>
  </g>

  <!-- Узлы-данные (scatter plot) -->
  <g fill="#B8964E">
    <circle cx="720"  cy="450" r="3.5"  opacity="0.55"/>
    <circle cx="840"  cy="390" r="2.5"  opacity="0.60"/>
    <circle cx="960"  cy="330" r="4"    opacity="0.65"/>
    <circle cx="1080" cy="295" r="2.5"  opacity="0.55"/>
    <circle cx="1180" cy="275" r="3"    opacity="0.60"/>
    <circle cx="1280" cy="265" r="2"    opacity="0.50"/>
    <circle cx="1360" cy="260" r="3.5"  opacity="0.45"/>
  </g>
  <!-- Вертикальные тик-линии под точками -->
  <g stroke="#B8964E" stroke-width="0.8" opacity="0.20">
    <line x1="720"  y1="455" x2="720"  y2="600"/>
    <line x1="840"  y1="395" x2="840"  y2="600"/>
    <line x1="960"  y1="335" x2="960"  y2="600"/>
    <line x1="1080" y1="300" x2="1080" y2="600"/>
    <line x1="1180" y1="280" x2="1180" y2="600"/>
    <line x1="1280" y1="270" x2="1280" y2="600"/>
    <line x1="1360" y1="265" x2="1360" y2="600"/>
  </g>

  <!-- Тонкие горизонтальные линии сетки (Y-ось) -->
  <g stroke="#B8964E" stroke-width="0.4" opacity="0.10">
    <line x1="600" y1="260" x2="1400" y2="260"/>
    <line x1="600" y1="350" x2="1400" y2="350"/>
    <line x1="600" y1="440" x2="1400" y2="440"/>
    <line x1="600" y1="530" x2="1400" y2="530"/>
  </g>
</svg>
